version: "3.9"

services:

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  rag-app:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - ollama
      - qdrant

volumes:
  ollama: